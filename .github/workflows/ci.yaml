name: Generate
on:
  workflow_dispatch:
    inputs:
      enable_sniff:
        description: 'Enable sniff (release)'
        type: string
        required: false
        default: 'true'
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env: 
  SING_BOX_VERSION: 1.13.0
  ENABLE_SNIFF: ${{ github.event.inputs.enable_sniff || 'true' }}

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install jsonnet just
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} curl -fsSL https://sing-box.app/install.sh | sh -s -- --version "${{ env.SING_BOX_VERSION }}"

          echo "::notice title=Jsonnet version::$(jsonnet --version)"
          echo "::notice title=Just version::$(just --version)"
          echo "::notice title=Sing-box version::$(sing-box version)"

      - name: Generate config
        run: just generate false

      - name: Commit config
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update template'
          file_pattern: 'public/template*.json'
          commit_user_name: YanamiChan[bot]
          commit_user_email: 182213109+YanamiChan[bot]@users.noreply.github.com
          commit_author: YanamiChan[bot] <182213109+YanamiChan[bot]@users.noreply.github.com>
